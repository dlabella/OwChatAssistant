name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Publish 
      run: dotnet publish ./src/OwChatAssistant/OwChatAssistant.csproj --configuration Release --output ./publish --self-contained -r win-x64 -p:PublishSingleFile=true
    
    - name: Create ZIP archive
      run: |
        cd publish
        7z a -r ../OwChatAssistant-${{ steps.version.outputs.VERSION }}.zip *
        cd ..
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          OwChatAssistant-*.zip
        draft: false
        prerelease: false
        body: |
          ## OwChatAssistant ${{ steps.version.outputs.VERSION }}
          
          **Descarga y ejecuta**
          
          1. Extrae el `.zip`
          2. Ejecuta `OwChatAssistant.exe`
          
          Compilado automáticamente con GitHub Actions (.NET 10)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}